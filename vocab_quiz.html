let ci=0,ans={},po=false;
const $M=document.getElementById('MC'),$sC=document.getElementById('sC'),$sW=document.getElementById('sW'),$sT=document.getElementById('sT'),$pT=document.getElementById('pTx'),$pF=document.getElementById('pFl'),$bP=document.getElementById('bP'),$bN=document.getElementById('bN'),$ov=document.getElementById('ov'),$nP=document.getElementById('nP'),$nG=document.getElementById('nG'),$cO=document.getElementById('cO'),$sBg=document.getElementById('sBg'),$sNm=document.getElementById('sNm');
function ld(){try{const s=localStorage.getItem('samy_full_v1');if(s){const d=JSON.parse(s);if(d&&d.a){ans=d.a;ci=d.i!=null&&d.i<Q.length?d.i:0;}}}catch(e){}}
function sv(){try{localStorage.setItem('samy_full_v1',JSON.stringify({a:ans,i:ci}));}catch(e){}}
function gs(){let c=0,w=0,t=0;Q.forEach((_,i)=>{const k='q'+i;if(k in ans){t++;if(ans[k]===Q[i].c)c++;else w++;}});return{c,w,t};}
function ui(){const{c,w,t}=gs();$sC.textContent=c;$sW.textContent=w;$sT.textContent=t;$pT.textContent=t+' من '+Q.length;$pF.style.width=(Q.length?(t/Q.length)*100:0)+'%';$bP.disabled=ci<=0;$bN.disabled=ci>=Q.length-1;
for(const s of SECS){if(ci>=s.s&&ci<=s.e){$sBg.textContent=s.n.split(':')[0];$sNm.textContent=s.n;break;}}
rNG();}
function rQ(){const q=Q[ci],k='q'+ci,a=k in ans,si=a?ans[k]:-1,ok=a&&si===q.c;
let oh='';for(let i=0;i<q.o.length;i++){let cl='op',ic='';if(a){cl+=' lk';if(i===q.c){cl+=' ok';ic='<span class="oic">&#10003;</span>';}else if(i===si){cl+=' no';ic='<span class="oic">&#10007;</span>';}else cl+=' dm';}
oh+=`<div class="${cl}" data-i="${i}" role="button" tabindex="0"><div class="ol">${LT[i]}</div><div class="otx">${q.o[i]}</div>${ic}</div>`;}
let eh='';if(a){const ec=ok?'ec':'ew',bc=ok?'bc':'bw',bt=ok?'&#10003; إجابة صحيحة':'&#10007; إجابة خاطئة';let ca='';if(!ok)ca=`<div class="eca">الإجابة الصحيحة: ${LT[q.c]}) ${q.o[q.c]}</div>`;eh=`<div class="eb sh ${ec}"><div class="ebg ${bc}">${bt}</div><div class="etx">${q.e}</div>${ca}</div>`;}
let cp='';const{c,w,t}=gs();if(t===Q.length){const p=Math.round((c/Q.length)*100);cp=`<div class="cpb"><h3>&#127942; تمت الإجابة على جميع الأسئلة!</h3><p>نتيجتك النهائية: ${c} صحيح من ${Q.length} (${p}%) — ${w} إجابة خاطئة</p><p style="margin-top:8px;font-size:.85rem;color:var(--tl)">بالتوفيق في الامتحان إن شاء الله!</p></div>`;}
 $M.innerHTML=`<article class="qc"><div class="qh"><div class="qn">السؤال ${ci+1}</div><div class="pr">صفحة <span class="pgb">${q.pg}</span></div></div><div class="qb"><div class="qt">${q.q}</div><div class="og">${oh}</div></div>${eh}</article>${cp}`;
if(!a){$M.querySelectorAll('.op').forEach(el=>{el.addEventListener('click',()=>hA(+el.dataset.i));el.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();hA(+el.dataset.i);}});});}
ui();window.scrollTo({top:0,behavior:'smooth'});}
function hA(i){const k='q'+ci;if(k in ans)return;ans[k]=i;sv();rQ();}
function nav(d){const n=ci+d;if(n<0||n>=Q.length)return;ci=n;sv();rQ();}
function goT(i){if(i<0||i>=Q.length)return;ci=i;sv();rQ();if(po)tgP();}
function rNG(){let h='';for(let i=0;i<Q.length;i++){const k='q'+i;let cl='nc';if(i===ci)cl+=' cu';if(k in ans)cl+=(ans[k]===Q[i].c)?' cc':' cw';h+=`<div class="${cl}" data-i="${i}" role="button" tabindex="0">${i+1}</div>`;}
 $nG.innerHTML=h;$nG.querySelectorAll('.nc').forEach(el=>{el.addEventListener('click',()=>goT(+el.dataset.i));el.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();goT(+el.dataset.i);}});});}
function tgP(){po=!po;$nP.classList.toggle('op',po);$ov.classList.toggle('sh',po);if(po)rNG();}
 $cO.querySelector('.cby').addEventListener('click',()=>{ans={};ci=0;sv();$cO.classList.remove('sh');if(po)tgP();rQ();});
 $cO.querySelector('.cbn').addEventListener('click',()=>$cO.classList.remove('sh'));
 $bP.addEventListener('click',()=>nav(-1));$bN.addEventListener('click',()=>nav(1));document.getElementById('bG').addEventListener('click',tgP);$ov.addEventListener('click',tgP);document.getElementById('pCl').addEventListener('click',tgP);document.getElementById('bR').addEventListener('click',()=>$cO.classList.add('sh'));
document.addEventListener('keydown',e=>{if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
if(e.key==='ArrowLeft'){e.preventDefault();nav(1);}else if(e.key==='ArrowRight'){e.preventDefault();nav(-1);}else if(e.key==='g'||e.key==='G'){e.preventDefault();tgP();}else if(e.key==='Escape'){if($cO.classList.contains('sh'))$cO.classList.remove('sh');else if(po)tgP();}else if(['1','2','3','4'].includes(e.key)){const i=+e.key-1;const q=Q[ci];if(q&&i<q.o.length&&!('q'+ci in ans)){e.preventDefault();hA(i);}}});
ld();rQ();
</script>
